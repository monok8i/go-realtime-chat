version: "2"

linters:
  enable:
    # Обязательный база — то, что должно быть включено практически всегда
    - errcheck # проверяет, что ошибки не игнорируются молча (err != nil обязателен)
    - govet # официальный статический анализатор от команды Go
    - staticcheck # мощный набор проверок: баги, устаревший код, упрощения
    - unused # находит неиспользуемые переменные, функции, импорты

    # Стиль и качество кода
    - ineffassign # находит присвоения, которые никогда не читаются
    - unconvert # лишние явные преобразования типов
    - unparam # неиспользуемые параметры функций
    - gocritic # набор эвристик по стилю и потенциальным багам
    - revive # современная замена golint, настраиваемая

    # Специфично полезные для конкурентного/сетевого кода (то, что у нас в проекте)
    - bodyclose # проверяет, что http.Response.Body всегда закрывается
    - sqlclosecheck # то же самое для sql.Rows/Stmt — актуально с Postgres
    - noctx # находит HTTP-запросы без context — важно, раз мы работаем с context

    # Безопасность и надёжность
    - gosec # находит потенциальные уязвимости (SQL-инъекции, hardcoded credentials и т.д.)
    - errorlint # проверяет корректную работу с error wrapping (errors.Is/As)
    - copyloopvar # ловит устаревший паттерн копирования переменной цикла (актуально < go 1.22)

  settings:
    revive:
      rules:
        - name: exported
          # требует doc-комментарии на экспортируемых функциях/типах — хорошая привычка
          disabled: false

    gocritic:
      disabled-checks:
        - ifElseChain # многие ругаются на этот чек как на слишком придирчивый

    errcheck:
      # игнорировать ошибку у defer Close() — частый и допустимый паттерн
      exclude-functions:
        - (*os.File).Close

issues:
  exclude-rules:
    # в тестах допустимо чуть менее строго относиться к некоторым проверкам
    - path: _test\.go
      linters:
        - gosec
        - errcheck

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
